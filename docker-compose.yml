version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5050:5000"
    volumes:
      - backend_data:/app/data  # Volumen Docker (sin rutas Windows)
    environment:
      - FLASK_APP=app.py
      - DATABASE_URL=sqlite:///app/data/portal.db
    restart: unless-stopped
    networks:
      - portal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3050:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://89.116.51.59:5050
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portal-network
    command: sh -c "chmod +x ./node_modules/.bin/vite || true; npm run dev -- --host 0.0.0.0"

networks:
  portal-network:
    driver: bridge

volumes:
  backend_data:  # Volumen persistente para la DB