version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5050:5000"
    volumes:
      - portal-db:/app/instance
    environment:
      - FLASK_APP=app.py
      - DATABASE_URL=sqlite:////app/instance/portal.db
    restart: unless-stopped
    networks:
      - portal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3050:3000"
    environment:
      - VITE_API_URL=https://extras.felipe-villa-nueva-teotitlan.site/api
      - CHOKIDAR_USEPOLLING=true
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge

volumes:
  portal-network:
  portal-db: