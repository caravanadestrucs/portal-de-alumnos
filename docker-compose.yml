version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5050:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_APP=app.py
      - DATABASE_URL=sqlite:////app/instance/portal.db
    restart: unless-stopped
    networks:
      - portal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://89.116.51.59:5050/api
    ports:
      - "3050:3000"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge

volumes:
  portal-network: