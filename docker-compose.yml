version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5050:5000"
    volumes:
      - backend_data:/app
      - backend_db:/app/data   # <-- carpeta, no archivo
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///app/data/portal.db
    restart: unless-stopped
    networks:
      - portal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3050:3000"
    volumes:
      - frontend_data:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5050
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portal-network
    command: sh -lc "chmod +x ./node_modules/.bin/vite || true; npm run dev -- --host 0.0.0.0"

networks:
  portal-network:
    driver: bridge

volumes:
  backend_data:
  backend_db:
  frontend_data:
  frontend_node_modules: