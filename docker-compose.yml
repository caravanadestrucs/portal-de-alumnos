version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./backend/portal.db:/app/portal.db  # Persistir DB
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///app/portal.db
    restart: unless-stopped
    networks:
      - portal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portal-network
    command: npm run dev -- --host 0.0.0.0

networks:
  portal-network:
    driver: bridge
